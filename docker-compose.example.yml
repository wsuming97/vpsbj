services:
  vps-tracker:
    build: .
    container_name: vps-tracker
    restart: unless-stopped
    ports:
      - "4000:4000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/api/vps/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./data:/app/data
      - ./public:/app/public
