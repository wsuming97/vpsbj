<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPS 产品库存实时跟踪与导购平台</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 头部导航 -->
  <header>
    <div class="header-container">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-server"><rect width="20" height="8" x="2" y="2" rx="2" ry="2"/><rect width="20" height="8" x="2" y="14" rx="2" ry="2"/><line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/></svg>
        <span>VPS 库存追踪</span>
      </div>
      <div class="filter-tabs" id="filter-tabs">
        <button class="tab-btn active" data-provider="all">全部</button>
        <!-- Categories injected by JS -->
      </div>
      <div class="head-links">
        <a href="https://t.me/dmvpsjk" class="btn-tg" target="_blank">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-send"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
          加入 TG 频道
        </a>
      </div>
    </div>
  </header>

  <!-- 状态栏 -->
  <div class="status-bar">
    <div class="status-container">
      <div class="uptime-info">
        <span class="blinking-dot"></span> <span id="last-update">数据拉取中...</span>
      </div>
      <div class="refresh-info">
        页面每隔 2 分钟自动刷新
        <button id="btn-refresh" class="btn-refresh">立即刷新</button>
      </div>
    </div>
  </div>

  <!-- 内容区 -->
  <main>
    <div class="container">
      <div class="product-grid" id="product-grid">
        <!-- 骨架屏提示 -->
        <div class="loading-state">
          正在连接后端数据库获取库存...
        </div>
      </div>
    </div>
  </main>

  <!-- 脚部 -->
  <footer>
    <div class="container footer-content">
      <div class="footer-left">
        <p>本项目为监控导航性质工具，库存状态具有极强的实时性波动，请以商家官网最终显示为准。</p>
        <p>&copy; 2026 VPS Aff Tracker. All Rights Reserved.</p>
      </div>
    </div>
  </footer>

  <!-- 模版：商品卡片 -->
  <template id="card-template">
    <div class="product-card">
      <div class="card-header">
        <span class="provider-badge">商家名称</span>
        <div class="stock-status">
          <!-- JS 注入状态 -->
        </div>
      </div>
      
      <div class="card-title">
        <h3 class="product-name">商品名称</h3>
        <p class="product-price">$9.99/年</p>
      </div>

      <div class="billing-cycles" hidden></div>

      <div class="tags-container routing-tags">
        <!-- JS 注入线路机房 Tag -->
      </div>
      
      <div class="card-specs">
        <div class="spec-row"><span class="spec-label">机房节点：</span><span class="spec-value dc-val">洛杉矶</span></div>
        <div class="spec-row"><span class="spec-label">CPU / 内存：</span><span class="spec-value cpu-val">1C 1G</span></div>
        <div class="spec-row"><span class="spec-label">硬盘大小：</span><span class="spec-value disk-val">20G SSD</span></div>
        <div class="spec-row"><span class="spec-label">流量宽带：</span><span class="spec-value bw-val">1T / 1Gbps</span></div>
      </div>

      <div class="card-actions">
        <a href="#" target="_blank" class="btn-buy">🛒 立即购买</a>
      </div>
      
      <div class="card-links">
        <a href="#" class="tool-link test-link" target="_blank" title="线路测速/Looking Glass">⚡ 测速透镜</a>
        <a href="#" class="tool-link review-link" target="_blank" title="本站针对该机型的专属评测文章">📝 专属测评</a>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
