<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPS 监控管理后台</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; margin: 0; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    h1 { margin-top: 0; font-size: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    
    #login-screen { text-align: center; margin-top: 100px; }
    #login-screen input { padding: 10px; font-size: 16px; border: 1px solid #cbd5e1; border-radius: 6px; }
    #login-screen button { padding: 10px 20px; font-size: 16px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
    
    #dashboard { display: none; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { background: #f8fafc; font-weight: 600; color: #475569; }
    
    .btn { padding: 6px 12px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 500; }
    .btn-off { background: #ef4444; color: white; }
    .btn-on { background: #10b981; color: white; }
    
    .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .status-active { background: #dcfce7; color: #166534; }
    .status-hidden { background: #fee2e2; color: #991b1b; }
    
    .toast { position: fixed; bottom: 20px; right: 20px; background: #334155; color: white; padding: 12px 24px; border-radius: 8px; display: none; }
  </style>
</head>
<body>

  <div id="login-screen">
    <h2>VPS 监控管理后台</h2>
    <input type="password" id="admin-pwd" placeholder="输入管理员密码">
    <button onclick="login()">登录</button>
  </div>

  <div class="container" id="dashboard">
    <h1>
      📦 在监控产品列表
      <button class="btn btn-on" onclick="loadData()">刷新数据</button>
    </h1>
    <table>
      <thead>
        <tr>
          <th>商家</th>
          <th>产品名称</th>
          <th>价格</th>
          <th>当前状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="catalog-body">
        <tr><td colspan="5">加载中...</td></tr>
      </tbody>
    </table>
  </div>

  <div id="toast" class="toast">操作成功</div>

  <script>
    let token = '';

    function login() {
      token = document.getElementById('admin-pwd').value;
      if (!token) return;
      loadData();
    }

    async function loadData() {
      try {
        const res = await fetch('/api/admin/catalog', { headers: { 'Authorization': token } });
        if (res.status === 401) {
          alert('密码错误');
          return;
        }
        const json = await res.json();
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        
        renderTable(json.data);
      } catch (err) {
        console.error(err);
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('catalog-body');
      tbody.innerHTML = '';
      
      data.forEach(item => {
        const tr = document.createElement('tr');
        
        const isHidden = item.isHidden;
        const statusHtml = isHidden 
          ? '<span class="status-badge status-hidden">已下架</span>' 
          : '<span class="status-badge status-active">监控中</span>';
          
        const btnHtml = isHidden
          ? `<button class="btn btn-on" onclick="toggleProduct('${item.id}')">上架 (恢复监控)</button>`
          : `<button class="btn btn-off" onclick="toggleProduct('${item.id}')">下架 (隐藏网页)</button>`;

        tr.innerHTML = `
          <td>${item.providerName || item.provider}</td>
          <td><strong>${item.name}</strong><br><small style="color:#64748b">${item.id}</small></td>
          <td>${item.price}</td>
          <td>${statusHtml}</td>
          <td>${btnHtml}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function toggleProduct(id) {
      if (!confirm('确定要切换该产品的状态吗？操作将实时生效，无需重启服务器。')) return;
      
      try {
        const res = await fetch(`/api/admin/catalog/${id}/toggle`, {
          method: 'POST',
          headers: { 'Authorization': token }
        });
        const json = await res.json();
        if (json.success) {
          showToast(json.isHidden ? '产品已下架并隐藏' : '产品已上架并恢复监控');
          loadData(); // refresh table
        } else {
          alert('操作失败: ' + json.error);
        }
      } catch (e) {
        alert('网络错误');
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }
  </script>
</body>
</html>
